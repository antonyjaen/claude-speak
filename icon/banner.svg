<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <style>
      .bar {
        transform-box: fill-box;
        transform-origin: 50% 100%;
      }
      @keyframes w1 { to { transform: scaleY(0.35); } }
      @keyframes w2 { to { transform: scaleY(0.50); } }
      @keyframes w3 { to { transform: scaleY(0.22); } }
      @keyframes w4 { to { transform: scaleY(0.58); } }
      @keyframes w5 { to { transform: scaleY(0.28); } }
      @keyframes w6 { to { transform: scaleY(0.52); } }
      @keyframes w7 { to { transform: scaleY(0.32); } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      .cursor { animation: blink 1.1s step-start infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="#0A0A0A" rx="10"/>

  <!-- Ambient orange glow behind bars -->
  <ellipse cx="159" cy="162" rx="160" ry="40" fill="rgba(204,85,0,0.07)"/>

  <!-- Separator -->
  <line x1="320" y1="20" x2="320" y2="160" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Equalizer bars, bottom-aligned at y=162                           -->
  <!-- 7 bars × 30px wide + 6 gaps × 12px = 282px                       -->
  <!-- centered in 320px left section: left margin = (320-282)/2 = 19px  -->
  <rect class="bar" x="19"  y="107" width="30" height="55"  rx="4" fill="#8C3200"
        style="animation: w1 0.80s ease-in-out  0.00s infinite alternate;"/>
  <rect class="bar" x="61"  y="62"  width="30" height="100" rx="4" fill="#A84000"
        style="animation: w2 0.68s ease-in-out -0.15s infinite alternate;"/>
  <rect class="bar" x="103" y="22"  width="30" height="140" rx="4" fill="#C05000"
        style="animation: w3 0.76s ease-in-out -0.08s infinite alternate;"/>
  <rect class="bar" x="145" y="42"  width="30" height="120" rx="4" fill="#CC5500"
        style="animation: w4 0.60s ease-in-out -0.20s infinite alternate;"/>
  <rect class="bar" x="187" y="32"  width="30" height="130" rx="4" fill="#D96800"
        style="animation: w5 0.72s ease-in-out -0.12s infinite alternate;"/>
  <rect class="bar" x="229" y="74"  width="30" height="88"  rx="4" fill="#E88800"
        style="animation: w6 0.64s ease-in-out -0.18s infinite alternate;"/>
  <rect class="bar" x="271" y="110" width="30" height="52"  rx="4" fill="#F5A623"
        style="animation: w7 0.84s ease-in-out -0.05s infinite alternate;"/>

  <!-- Wordmark -->
  <text x="344" y="80"
        font-family="'Courier New',Courier,monospace"
        font-size="40" font-weight="700"
        fill="#F0F0F0" letter-spacing="-1">claude<tspan fill="#CC5500">-voice</tspan></text>

  <!-- Tagline -->
  <text x="344" y="110"
        font-family="'Courier New',Courier,monospace"
        font-size="12" fill="#888888" letter-spacing="5">VOICE · TTS · HOOKS</text>

  <!-- Install prompt -->
  <text x="344" y="148"
        font-family="'Courier New',Courier,monospace"
        font-size="13" fill="#777777">$ pipx install claude-voice</text>

  <!-- Blinking cursor after install command -->
  <text class="cursor" x="555" y="148"
        font-family="'Courier New',Courier,monospace"
        font-size="13" fill="#CC5500">▌</text>
</svg>
