<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1080px; overflow: hidden; background: #0A0A0A; }

    #cv-icon {
      width: 1080px;
      height: 1080px;
      background: #0A0A0A;
      position: relative;
      overflow: hidden;
    }

    /* Background decoratives */
    .glow-ring {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,85,0,0.13) 0%, transparent 68%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
    }
    .glow-warm {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,166,35,0.09) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
    }
    .grid-line-h {
      position: absolute;
      left: 200px;
      right: 200px;
      height: 1px;
      background: rgba(80,50,20,0.22);
    }
    .grid-line-v {
      position: absolute;
      top: 200px;
      bottom: 200px;
      width: 1px;
      background: rgba(80,50,20,0.22);
    }

    /* Terminal scanlines */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.10) 3px,
        rgba(0,0,0,0.10) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Equalizer bars */
    .bars-wrap {
      position: absolute;
      top: 310px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 22px;
    }
    .bar {
      width: 54px;
      border-radius: 6px 6px 3px 3px;
      transform-origin: 50% 100%;
    }
    #b1 { height: 96px;  background: #8C3200; }
    #b2 { height: 168px; background: #A84000; }
    #b3 { height: 234px; background: #C05000; }
    #b4 { height: 276px; background: #CC5500; }
    #b5 { height: 226px; background: #D96800; }
    #b6 { height: 160px; background: #E88800; }
    #b7 { height: 90px;  background: #F5A623; }

    /* Wordmark */
    .wordmark {
      position: absolute;
      top: 660px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Mono', 'Fira Code', 'Courier New', monospace;
      font-weight: 500;
      font-size: 80px;
      letter-spacing: -2px;
      color: #F0F0F0;
    }
    .wordmark .accent { color: #CC5500; }

    /* Tagline */
    .tagline {
      position: absolute;
      top: 762px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Mono', 'Fira Code', 'Courier New', monospace;
      font-weight: 400;
      font-size: 26px;
      letter-spacing: 6px;
      color: #3A3A3A;
      text-transform: uppercase;
    }

    /* Hairline bottom rule */
    .rule {
      position: absolute;
      bottom: 200px;
      left: 280px;
      right: 280px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #3A3A3A, transparent);
    }
  </style>
</head>
<body>
  <div id="cv-icon" data-composition-id="cv-icon" data-start="0" data-width="1080" data-height="1080">

    <!-- Background layer -->
    <div class="glow-ring"   id="glow-ring"></div>
    <div class="glow-warm"   id="glow-warm"></div>
    <div class="scanlines"   id="scanlines"></div>
    <div class="grid-line-h" id="gl-h1" style="top: 380px;"></div>
    <div class="grid-line-h" id="gl-h2" style="top: 620px;"></div>
    <div class="grid-line-v" id="gl-v1" style="left: 380px;"></div>
    <div class="grid-line-v" id="gl-v2" style="left: 700px;"></div>

    <!-- Equalizer bars -->
    <div class="bars-wrap" id="bars-wrap">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
      <div class="bar" id="b5"></div>
      <div class="bar" id="b6"></div>
      <div class="bar" id="b7"></div>
    </div>

    <!-- Text -->
    <div class="wordmark" id="wordmark">claude<span class="accent">-speak</span></div>
    <div class="tagline"  id="tagline">VOICE · TTS · HOOKS</div>
    <div class="rule"     id="rule"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const DURATION = 10;

      // Glow cycle
      const GLOW_HALF = 1.4;  // full yoyo = 2.8s

      // Repeat counts (GSAP repeat = extra plays after first, so total = repeat+1)
      function reps(cycleDuration) {
        return Math.ceil(DURATION / cycleDuration) - 1;
      }

      const GLOW_REPS = reps(GLOW_HALF * 2);  // ≈3

      const tl = gsap.timeline({ paused: true });

      // ── Background layer ambience ──────────────────────────────────────────
      tl.from("#glow-ring", { scale: 0.6, opacity: 0, duration: 1.2, ease: "power2.out" }, 0);
      tl.from("#glow-warm", { scale: 0.6, opacity: 0, duration: 1.0, ease: "power2.out" }, 0.15);
      tl.from("#gl-h1",     { opacity: 0, duration: 0.8, ease: "power1.out" }, 0.6);
      tl.from("#gl-h2",     { opacity: 0, duration: 0.8, ease: "power1.out" }, 0.7);
      tl.from("#gl-v1",     { opacity: 0, duration: 0.8, ease: "power1.out" }, 0.65);
      tl.from("#gl-v2",     { opacity: 0, duration: 0.8, ease: "power1.out" }, 0.75);

      // Glow breathing
      tl.to("#glow-ring", { scale: 1.12, duration: GLOW_HALF, ease: "sine.inOut",
        repeat: GLOW_REPS, yoyo: true }, 1.2);
      tl.to("#glow-warm", { scale: 1.18, duration: GLOW_HALF * 1.1, ease: "sine.inOut",
        repeat: GLOW_REPS, yoyo: true }, 1.4);

      // ── Bars entrance ─────────────────────────────────────────────────────
      const barIds = ["#b1","#b2","#b3","#b4","#b5","#b6","#b7"];
      barIds.forEach((id, i) => {
        tl.from(id, {
          scaleY: 0,
          opacity: 0,
          transformOrigin: "50% 100%",
          duration: 0.55,
          ease: "back.out(1.5)"
        }, 0.55 + i * 0.07);
      });

      // ── Bars wave — each bar has its own rhythm for organic motion ─────────
      const barWaves = [
        { id: "#b1", minScale: 0.35, delay: 1.70, dur: 0.40 },
        { id: "#b2", minScale: 0.50, delay: 1.55, dur: 0.34 },
        { id: "#b3", minScale: 0.22, delay: 1.65, dur: 0.38 },
        { id: "#b4", minScale: 0.58, delay: 1.50, dur: 0.30 },
        { id: "#b5", minScale: 0.28, delay: 1.60, dur: 0.36 },
        { id: "#b6", minScale: 0.52, delay: 1.58, dur: 0.32 },
        { id: "#b7", minScale: 0.32, delay: 1.72, dur: 0.42 },
      ];
      barWaves.forEach(({ id, minScale, delay, dur }) => {
        const rep = Math.ceil(DURATION / (dur * 2)) - 1;
        tl.to(id, {
          scaleY: minScale,
          transformOrigin: "50% 100%",
          duration: dur,
          ease: "sine.inOut",
          repeat: rep,
          yoyo: true
        }, delay);
      });

      // ── Text entrance ─────────────────────────────────────────────────────
      tl.from("#wordmark", { y: 28, opacity: 0, duration: 0.7, ease: "power3.out" }, 1.05);
      tl.from("#tagline",  { y: 18, opacity: 0, duration: 0.55, ease: "power2.out" }, 1.25);
      tl.from("#rule",     { scaleX: 0, opacity: 0, duration: 0.6, ease: "power2.out",
        transformOrigin: "50% 50%" }, 1.4);

      window.__timelines["cv-icon"] = tl;
    </script>
  </div>
</body>
</html>
